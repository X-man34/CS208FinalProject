[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  external_node_modules = ["express", "mysql2", "pug", "serverless-http"]
  included_files = ["views/**", "public/**"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/app/:splat"
  status = 200
